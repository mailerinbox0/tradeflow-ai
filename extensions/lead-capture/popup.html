<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TradeFlow Mail</title>
    <style>
      :root {
        --bg: #050b18;
        --panel: #0b1428;
        --line: rgba(148, 163, 184, 0.25);
        --text: #f4f7fb;
        --muted: #8b9bb4;
        --blue: #2f7bff;
        --red: #ef4444;
        --green: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 340px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { padding: 14px; }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .brand svg { flex-shrink: 0; }
      h1 { font-size: 15px; margin: 0; }
      .sub { margin: 2px 0 0; color: var(--muted); font-size: 11px; }
      .search-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      input {
        width: 100%;
        min-height: 40px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        padding: 0 12px;
        font-size: 13px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: var(--blue);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        min-height: 40px;
        padding: 0 12px;
      }
      button:disabled { opacity: 0.55; cursor: default; }
      button.ghost {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
      }
      .search-btn {
        width: 44px;
        display: grid;
        place-items: center;
        padding: 0;
      }
      #msg { margin-top: 10px; font-size: 12px; min-height: 18px; }
      .err { color: var(--red); }
      .ok { color: var(--green); }
      .hint { margin-top: 10px; font-size: 11px; color: var(--muted); line-height: 1.4; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="#2f7bff" stroke-width="2" />
          <path d="M20 20l-3.5-3.5" stroke="#2f7bff" stroke-width="2" stroke-linecap="round" />
        </svg>
        <div>
          <h1>TradeFlow Mail</h1>
          <p class="sub">Search leads · send campaign</p>
        </div>
      </div>

      <div class="search-row">
        <input id="email" type="email" placeholder="Search email…" autocomplete="off" />
        <button id="search" class="search-btn" title="Search" type="button" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2" />
            <path d="M20 20l-3.5-3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div id="msg"></div>
      <p class="hint">
        If the email is new, a right float tab opens on the page so you can enter the lead name and
        send the admin campaign message.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
